# Configurazione esplicita per Railway.
# Costringe Railway a buildare con il Dockerfile di root invece di provare a
# rilevare il progetto in modo automatico (nixpacks può confondersi nelle
# monorepo backend/frontend).

[build]
builder   = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway inietta automaticamente PORT, il server lo rispetta.
startCommand     = "node server.js"
healthcheckPath  = "/api/health"
healthcheckTimeout = 30
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 3
